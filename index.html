<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>IGLESIA LUZ Y ESPERANZA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    ⛪ IGLESIA LUZ Y ESPERANZA
  </header>

  <main class="container">

    <!-- PRODUCTOS -->
    <section class="productos">
      <h2>Productos</h2>
      <div id="listaProductos"></div>
    </section>

    <!-- PEDIDO -->
    <section class="pedido">
      <h2>Pedido</h2>
      <div id="listaPedido"></div>

      <h3>Total: Bs <span id="total">0</span></h3>

      <div class="pago">
        <button onclick="setPago('QR')">QR</button>
        <button onclick="setPago('EFECTIVO')">Efectivo</button>
      </div>

      <input id="pagoCliente" placeholder="Pago cliente">

      <h3>Cambio: Bs <span id="cambio">0</span></h3>

      <button onclick="crearPedido()">CREAR PEDIDO</button>
      <hr>

<h2>📋 Historial</h2>
<button onclick="renderHistorial()">Ver historial</button>

<div id="historial"></div>
      <button onclick="cancelarPedido()" style="background:red;color:white;">
  CANCELAR PEDIDO
</button>
      <div id="pedidosActivos"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
